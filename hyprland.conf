################################################################################
# HYPRLAND CONFIGURATION
################################################################################

# --- ENVIRONMENT VARIABLES ---
env = XDG_CURRENT_DESKTOP,Hyprland
env = XDG_SESSION_TYPE,wayland
env = XDG_SESSION_DESKTOP,Hyprland
env = XCURSOR_THEME,breeze_cursors
env = XCURSOR_SIZE,24

# --- MONITOR ---

monitor=HDMI-A-1,1920x1080@60,0x0,1
# --- STARTUP ---
exec-once = dbus-update-activation-environment --systemd WAYLAND_DISPLAY XDG_CURRENT_DESKTOP
exec-once = systemctl --user import-environment WAYLAND_DISPLAY XDG_CURRENT_DESKTOP
exec-once = gsettings set org.gnome.desktop.interface cursor-theme 'breeze_cursors'
exec-once = gsettings set org.gnome.desktop.interface color-scheme 'prefer-dark'
exec-once = hyprctl setcursor breeze_cursors 24
exec-once = kando
exec-once = wpaperd
exec-once = waybar
exec-once = hyprpaper

# --- INPUT & GESTURES ---
input {
    kb_layout = us
    numlock_by_default = true
    follow_mouse = 1

    touchpad {
        natural_scroll = true
        tap-to-click = true
        disable_while_typing = true
    }
    sensitivity = 0 
}


cursor {
    no_hardware_cursors = true
}
# --- LOOK & FEEL ---
general {
    gaps_in = 8
    gaps_out = 15
    border_size = 5
    col.active_border = rgb(ff0000) rgb(000000) 45deg
    col.inactive_border = rgb(1a1a1a)
    layout = dwindle
}

decoration {
    rounding = 10
    blur {
       enabled = true
       size = 6
       passes = 1
    }
    shadow {
        enabled = true
        range = 15
        render_power = 10
        color = rgb(ff0000)
    }
}

animations {
    enabled = true
    bezier = myBezier, 0.05, 0.9, 0.1, 1.05
    animation = windows, 1, 7, myBezier
    animation = windowsOut, 1, 7, default, popin 80%
    animation = border, 1, 10, default
    animation = fade, 1, 7, default
    animation = workspaces, 1, 6, default
}

# --- LAYOUTS ---
dwindle {
    pseudotile = true 
    preserve_split = true 
}

master {
    new_status = master
}

misc {
    disable_hyprland_logo = false
}

# --- WORKSPACES ---
workspace = 1, persistent:true
workspace = 2, persistent:true
workspace = 3, persistent:true
workspace = 4, persistent:true
workspace = 5, persistent:true

# --- WINDOW & LAYER RULES ---
# Garuda / System Tools
windowrule = match:class kitty, match:float yes
windowrule = match:class garuda-assistant, match:float yes
windowrule = match:class garuda-boot-options, match:float yes
windowrule = match:class garuda-boot-repair, match:float yes
windowrule = match:class garuda-gamer, match:float yes
windowrule = match:class garuda-network-assistant, match:float yes
windowrule = match:class garuda-settings-manager, match:float yes
windowrule = match:class garuda-welcome, match:float yes
windowrule = match:class calamares, match:float yes

# Kando and cava
windowrule = no_blur on, match:class kando
windowrule = opaque on, match:class kando
windowrule = no_anim on, match:class kando
windowrule = float on, match:class kando
windowrule = size 100% 100%, match:class kando
windowrule = float on, match:class background_cava
windowrule = pin on, match:class background_cava
windowrule = size 100% 30%, match:class background_cava
windowrule = move 0 70%, match:class background_cava
windowrule = no_focus on, match:class background_cava
windowrule = no_initial_focus on, match:class background_cava
windowrule = opacity 0.6 override 0.6 override, match:class background_cava
windowrule = no_shadow on, match:class background_cava
windowrule = no_blur on, match:class background_cava
# Waybar
layerrule = match:class waybar, match:float yes
layerrule = match:class waybar, ignore_alpha 0.5

# --- KEYBINDS ---
$mainMod = SUPER

# Applications & Core Actions
bind = $mainMod, Space, exec, kando --trigger main-menu
bind = $mainMod SHIFT, R, exec, hyprctl reload
bind = $mainMod, 36, exec, foot 
bind = $mainMod, P, pseudo, 
bind = $mainMod SHIFT, P, togglesplit, 
bind = $mainMod, O, exec, firefox
bind = $mainMod SHIFT, C, exec, killall -9 wpaperd && wpaperd
bind = SUPER, Q, killactive,
bind = SUPER, DELETE, exec, hyprctl kill
bind = $win, F, togglefloating, 
bind = SUPER, n, exec, thunar
# Function Keys (Apps)
bind = $mainMod, F1, exec, firefox
bind = $mainMod, F2, exec, thunderbird
bind = $mainMod, F3, exec, thunar
bind = $mainMod, F4, exec, geany
bind = $mainMod, F5, exec, github-desktop
bind = $mainMod, F6, exec, gparted
bind = $mainMod, F7, exec, inkscape
bind = $mainMod, F8, exec, blender
bind = $mainMod, F9, exec, meld
bind = $mainMod, F10, exec, joplin-desktop
bind = $mainMod, F11, exec, snapper-tools
bind = $mainMod, F12, exec, galculator

# Navigation & Focus
bind = $mainMod, left, movefocus, l
bind = $mainMod, H, movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, L, movefocus, r
bind = $mainMod, up, movefocus, u
bind = $mainMod, K, movefocus, u
bind = $mainMod, down, movefocus, d
bind = $mainMod, J, movefocus, d

# Fullscreen & Layout
bind = $mainMod, M, fullscreen, 2
bind = $mainMod, F, fullscreen, 0
bind = $mainMod SHIFT, F, fullscreenstate, 0 2

# Workspace Switching
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

# Move Window to Workspace
bind = ALT SHIFT, 1, movetoworkspace, 1
bind = ALT SHIFT, 2, movetoworkspace, 2
bind = ALT SHIFT, 3, movetoworkspace, 3
bind = ALT SHIFT, 4, movetoworkspace, 4
bind = ALT SHIFT, 5, movetoworkspace, 5
bind = ALT SHIFT, 6, movetoworkspace, 6
bind = ALT SHIFT, 7, movetoworkspace, 7
bind = ALT SHIFT, 8, movetoworkspace, 8
bind = ALT SHIFT, 9, movetoworkspace, 9
bind = ALT SHIFT, 0, movetoworkspace, 10

# Move Window to Workspace (Silent)
bind = $mainMod SHIFT, 1, movetoworkspacesilent, 1
bind = $mainMod SHIFT, 2, movetoworkspacesilent, 2
bind = $mainMod SHIFT, 3, movetoworkspacesilent, 3
bind = $mainMod SHIFT, 4, movetoworkspacesilent, 4
bind = $mainMod SHIFT, 5, movetoworkspacesilent, 5
bind = $mainMod SHIFT, 6, movetoworkspacesilent, 6
bind = $mainMod SHIFT, 7, movetoworkspacesilent, 7
bind = $mainMod SHIFT, 8, movetoworkspacesilent, 8
bind = $mainMod SHIFT, 9, movetoworkspacesilent, 9
bind = $mainMod SHIFT, 0, movetoworkspacesilent, 10

# Mouse Binds
bind = $mainMod, mouse_down, workspace, e-1
bind = $mainMod, mouse_up, workspace, e+1
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

# Audio & Brightness (XF86 Keys mapped by code)
bind = ,122, exec, pamixer --decrease 5; notify-send " Volume: "$(pamixer --get-volume) -t 500
bind = ,123, exec, pamixer --increase 5; notify-send " Volume: "$(pamixer --get-volume) -t 500
bind = ,121, exec, pamixer --toggle-mute; notify-send " Volume: Toggle-mute" -t 500
bind = ,XF86AudioMicMute, exec, pactl set-source-mute @DEFAULT_SOURCE@ toggle; notify-send "System Mic: Toggle-mute" -t 500
bind = ,232,exec,brightnessctl -c backlight set 5%-
bind = ,233,exec,brightnessctl -c backlight set +5%

# Screenshots
bind = ,Print, exec, grim -g "$(slurp)" - | swappy -f -
bind = CTRL, Print, exec, .config/hypr/scripts/screenshot_window.sh
bind = SHIFT, Print, exec, .config/hypr/scripts/screenshot_display.sh
################################################################################
# HYPRLAND CONFIGURATION
################################################################################
bind = SHIFT, Print, exec, .config/hypr/scripts/screenshot_display.sh
################################################################################
# HYPRLAND CONFIGURATION
################################################################################
bind = SHIFT, Print, exec, .config/hypr/scripts/screenshot_display.sh

